<!DOCTYPE html>
<html>
<head>
  <title>Eid Salami for Radowan</title>

  <!-- 📱 Mobile Friendly -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🌙 Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 20px;
      text-align: center;
      background: linear-gradient(to right, #064e3b, #065f46);
      color: #fef3c7;
      font-family: 'Poppins', sans-serif;
    }

    .container {
      max-width: 400px;
      margin: auto;
    }

    h1, h2 {
      font-family: 'Amiri', serif;
    }

    img.profile {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid gold;
      margin-top: 20px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      background: gold;
      color: black;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.97);
    }

    .number {
      margin-top: 15px;
      font-size: 16px;
      padding: 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>

<div class="container">

  <!-- 👤 Profile -->
  <img src="me.jpg" class="profile">
  <h2>Radowan Rahi</h2>

  <!-- 🌙 Title -->
  <h1>Eid Mubarak 🌙</h1>
  <p>Send me your wishes & Eid Salami 💸</p>

  <!-- 💌 Wish -->
  <a href="https://docs.google.com/forms/d/e/1FAIpQLSeLQBJubDrGwO_BEriYEWhU4f1uLkg1WtqKXKvYhVVSCaOXGg/viewform?usp=header" target="_blank">
    <button>Send Wish 💌</button>
  </a>

  <!-- 💸 Salami -->
  <button onclick="payNow()">Send Salami 💸</button>

  <!-- 📲 Hidden Number -->
  <h2 id="numberBox" class="number" style="display:none;" onclick="copyNumber()">
    📲 bKash/Nagad: 01813025646 (Tap to copy)
  </h2>

</div>

<script>
function payNow() {
  document.getElementById("numberBox").style.display = "block";
  alert("Now send your salami 😄");
}

function copyNumber() {
  navigator.clipboard.writeText("01813025646");
  alert("Number copied!");
}
</script>

</body>
</html>
